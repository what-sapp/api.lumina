<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #f0f0f0;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            max-width: 360px;
            width: 90%;
            text-align: center;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 0.5rem; font-size: 1.2rem; }
        p  { color: #666; font-size: 0.85rem; margin-bottom: 1.5rem; }
        #status {
            padding: 0.75rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            background: #fff3cd;
            color: #856404;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            background: #4f46e5;
            color: white;
            margin-bottom: 0.5rem;
        }
        button:hover { opacity: 0.9; }
        #logout-btn { background: #f43f5e; display: none; }
        #user-info  { display: none; margin-bottom: 1rem; }
        .avatar {
            width: 48px; height: 48px;
            border-radius: 50%;
            margin: 0 auto 0.5rem;
            display: block;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>🔐 Firebase Auth Test</h2>
    <p>Test apakah Firebase Auth bisa jalan di environment ini</p>

    <div id="status">⏳ Initializing Firebase...</div>

    <div id="user-info">
        <img id="user-avatar" class="avatar" src="" alt="">
        <div id="user-name" style="font-weight:700; margin-bottom:0.25rem;"></div>
        <div id="user-email" style="font-size:0.75rem; color:#666;"></div>
    </div>

    <button id="login-btn" style="display:none;">Login dengan Google</button>
    <button id="logout-btn">Logout</button>
</div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
        from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    const status    = document.getElementById('status');
    const loginBtn  = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userInfo  = document.getElementById('user-info');

    status.textContent = '⏳ Connecting to Firebase...';

    try {
        const app  = initializeApp({
            apiKey:            "AIzaSyCZzu6bxJrY6R508H0oJQZiuycya_lLIV0",
            authDomain:        "apiku-86e76.firebaseapp.com",
            projectId:         "apiku-86e76",
            storageBucket:     "apiku-86e76.firebasestorage.app",
            messagingSenderId: "637345497070",
            appId:             "1:637345497070:web:62c84a71b6a415206d18ff"
        });

        const auth     = getAuth(app);
        const provider = new GoogleAuthProvider();

        status.textContent = '✅ Firebase connected! Checking auth state...';
        status.style.background = '#d1fae5';
        status.style.color = '#065f46';

        onAuthStateChanged(auth, (user) => {
            if (user) {
                status.textContent = `✅ Logged in as: ${user.email}`;
                status.style.background = '#d1fae5';
                status.style.color = '#065f46';
                document.getElementById('user-avatar').src = user.photoURL || '';
                document.getElementById('user-name').textContent = user.displayName || 'User';
                document.getElementById('user-email').textContent = user.email;
                userInfo.style.display = 'block';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'block';
            } else {
                status.textContent = '⚠️ Not logged in. Click button to test login.';
                status.style.background = '#fff3cd';
                status.style.color = '#856404';
                userInfo.style.display = 'none';
                loginBtn.style.display = 'block';
                logoutBtn.style.display = 'none';
            }
        });

        loginBtn.addEventListener('click', async () => {
            try {
                status.textContent = '⏳ Opening Google login...';
                await signInWithPopup(auth, provider);
            } catch (e) {
                status.textContent = `❌ Login error: ${e.code} — ${e.message}`;
                status.style.background = '#fee2e2';
                status.style.color = '#991b1b';
            }
        });

        logoutBtn.addEventListener('click', () => signOut(auth));

    } catch (e) {
        status.textContent = `❌ Firebase init error: ${e.message}`;
        status.style.background = '#fee2e2';
        status.style.color = '#991b1b';
    }
</script>
</body>
</html>
